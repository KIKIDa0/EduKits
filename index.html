<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>교구 점검표 확인용</title>

  <!-- 고딕 폰트 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --line:#e6e8f0;
      --text:#111827;
      --muted:#6b7280;
      --primary:#2563eb;
      --primary-weak:#e8f0ff;
      --danger:#b00020;
      --shadow: 0 6px 20px rgba(17,24,39,.06);
      --radius:14px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:"Noto Sans KR", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:var(--bg);
    }

    .wrap{
      max-width: 1180px;
      margin: 18px auto 40px;
      padding: 0 14px;
    }

    header{
      background:var(--card);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      border-radius: var(--radius);
      padding:14px;
      position: sticky;
      top: 10px;
      z-index: 20;
    }

    h1{
      font-size:18px;
      margin:0 0 10px;
      display:flex;
      gap:10px;
      align-items:center;
    }
    .badge{
      font-size:12px;
      padding:4px 8px;
      border-radius:999px;
      background:var(--primary-weak);
      color:var(--primary);
      font-weight:700;
    }

    .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:end; }
    label{ display:flex; gap:6px; align-items:center; color:var(--muted); font-size:13px; }
    input[type="text"], input[type="number"], textarea{
      font-family: inherit;
      border:1px solid var(--line);
      border-radius:10px;
      padding:8px 10px;
      background:#fff;
      color:var(--text);
      outline:none;
    }
    input[type="text"]{ width:240px; }
    input[type="number"]{ width:110px; }
    textarea{
      width:100%;
      resize:vertical;
      min-height:72px;
      white-space: pre-wrap;
    }

    .btn{
      border:1px solid var(--line);
      background:#fff;
      padding:9px 12px;
      border-radius:10px;
      cursor:pointer;
      font-weight:700;
    }
    .btn.primary{
      border-color: transparent;
      background: var(--primary);
      color:#fff;
    }
    .btn.ghost{
      background: transparent;
    }
    .btn.danger{
      border-color: rgba(176,0,32,.25);
      color: var(--danger);
      background: #fff;
    }
    .btn:active{ transform: translateY(1px); }

    .tabs{
      display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;
    }
    .tab{
      border:1px solid var(--line);
      background:#fff;
      padding:8px 10px;
      border-radius:999px;
      cursor:pointer;
      font-weight:800;
      font-size:13px;
    }
    .tab[aria-selected="true"]{
      background: var(--primary-weak);
      border-color: rgba(37,99,235,.25);
      color: var(--primary);
    }

    .layout{
      display:grid;
      grid-template-columns: 340px 1fr;
      gap:14px;
      margin-top:14px;
    }
    @media (max-width: 980px){
      .layout{ grid-template-columns:1fr; }
      header{ position: static; }
    }

    .panel{
      background:var(--card);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      border-radius: var(--radius);
      padding:14px;
      min-height: 520px;
    }
    .panel h2{
      margin:0 0 10px;
      font-size:15px;
    }
    .help{
      font-size:12px;
      color:var(--muted);
      margin:6px 0 0;
      line-height:1.45;
    }

    /* 프로그램 선택 */
    .filterRow{
      display:flex; gap:8px; flex-wrap:wrap; align-items:center;
      margin-bottom:10px;
    }
    .list{
      border:1px solid var(--line);
      border-radius: 12px;
      overflow:hidden;
    }
    .listHead{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:10px 10px;
      background:#fafbff;
      border-bottom:1px solid var(--line);
      font-weight:800;
      font-size:13px;
    }
    .listBody{
      max-height: 560px;
      overflow:auto;
      padding:8px;
      background:#fff;
    }

    .item{
      display:flex;
      gap:10px;
      align-items:center;
      padding:10px 10px;
      border-radius:12px;
      cursor:pointer;
      user-select:none;
    }
    .item:hover{ background:#f7f8ff; }
    .item strong{ font-size:13px; font-weight:800; }

    /* 오른쪽 탭 컨테이너 */
    .tabPanel{
      height: calc(100vh - 230px);
      min-height: 520px;
      overflow:auto;
      padding-right:6px;
    }
    @media (max-width: 980px){
      .tabPanel{ height:auto; min-height:auto; overflow:visible; }
    }

    .contentTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
      position: sticky;
      top: 0;
      background: var(--card);
      padding: 6px 0 10px;
      z-index: 3;
      border-bottom: 1px solid var(--line);
    }
    .count{ font-weight:900; color:var(--primary); }

    /* 배정 카드 */
    .card{
      border:1px solid var(--line);
      border-radius: 14px;
      padding:12px;
      background:#fff;
      margin-bottom:12px;
    }
    .cardTitle{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      margin-bottom:10px;
    }
    .cardTitle h3{
      margin:0;
      font-size:15px;
      font-weight:800;
    }
    .mini{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
    }

    /* 노트북/태블릿/스마트폰/인원 한 줄 배치 */
    .rowInputs{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap:10px;
    }
    @media (max-width: 980px){
      .rowInputs{ grid-template-columns: 1fr 1fr; }
    }
    .inField{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:6px;
      border:1px solid var(--line); /* ✅ 테두리 */
      border-radius: 12px;
      background:#fff;
    }
    .inField span{
      font-size:12px;
      color:var(--muted);
      font-weight:900;
      white-space:nowrap;
    }
    .inField input{
      width:72px;
      max-width:72px;
      padding:6px 6px;
      text-align:center;
    }

    table{
      width:100%;
      border-collapse: collapse;
      border:1px solid var(--line);
      border-radius: 12px;
      overflow:hidden;
      background:#fff;
    }
    th, td{
      border-bottom:1px solid var(--line);
      padding:10px 10px;
      font-size:13px;
      vertical-align:top;
    }
    th{
      background:#fafbff;
      text-align:left;
      color:#374151;
      font-weight:900;
    }
    tr:last-child td{ border-bottom:none; }

    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
      font-size: 12.5px;
      border:1px solid var(--line);
      border-radius: 12px;
      padding:12px;
      background:#fff;
    }

    /* 프린트 전용 영역 */
    .printArea{ display:none; }
    .printHead{
      border:1px solid var(--line);
      border-radius: 12px;
      padding:14px;
      margin-bottom: 12px;
    }
    .printHead .big{
      font-size:18px;
      font-weight:900;
      margin-bottom:8px;
    }

    /* ✅ 프린트 헤더 한 줄 메타 */
    .printMetaRow{
      display:flex;
      flex-wrap:wrap;
      gap:14px;
      font-size:14px;
      font-weight:900;
      line-height:1.6;
    }
    .printMetaRow .metaItem{
      display:inline-flex;
      gap:6px;
      align-items:baseline;
    }
    .printMetaRow .label{
      color:#374151;
      font-weight:800;
    }
    .printMetaRow .value{
      color:#111827;
      font-weight:900;
    }

    @media print{
      .no-print{ display:none !important; }
      .screenOnly{ display:none !important; } /* ✅ 화면용(배정/총합/미리보기) 숨김 */
      body{ background:#fff; }
      .wrap{ max-width:none; margin:0; padding:0; }
      header{ position: static; box-shadow:none; border-radius:0; border:none; }
      .panel{ box-shadow:none; border-radius:0; border:none; }
      .layout{ grid-template-columns:1fr; }
      .tabPanel{ height:auto !important; overflow:visible !important; min-height:auto !important; }
      .printArea{ display:block !important; }
    }
  </style>
</head>

<body>
<div class="wrap">
  <header class="no-print">
    <h1>
      교구 점검표 확인용
      <span class="badge">선택 → 배정 → 총합 → 톡 복사</span>
    </h1>

    <div class="row">
      <label>학교명
        <input id="school" type="text" placeholder="예: 대전 탄방중" />
      </label>
      <label>차시
        <input id="session" type="text" placeholder="예: 2차시" />
      </label>
      <label>날짜
        <input id="date" type="text" placeholder="예: 12/22" />
      </label>
      <label>인원(전체)
        <input id="people" type="number" min="0" step="1" placeholder="예: 30" />
      </label>

      <button class="btn primary" id="btnCopy">톡용 복사</button>
      <button class="btn" id="btnPrint">출력</button>
      <button class="btn danger" id="btnReset">초기화</button>
    </div>

    <div class="tabs" role="tablist" aria-label="탭">
      <button class="tab" id="tabAssign" aria-selected="true">프로그램 배정</button>
      <button class="tab" id="tabTotals" aria-selected="false">교구 총합</button>
      <button class="tab" id="tabPreview" aria-selected="false">문구 미리보기</button>
    </div>
  </header>

  <div class="layout">
    <!-- 프로그램 선택 -->
    <aside class="panel no-print">
      <h2>프로그램 선택</h2>

      <div class="filterRow">
        <input id="search" type="text" placeholder="프로그램 검색" style="width:100%;" />
      </div>
      <div class="filterRow">
        <button class="btn" id="btnAll">전체선택</button>
        <button class="btn ghost" id="btnNone">해제</button>
      </div>

      <div class="list">
        <div class="listHead">
          <span>목록</span>
          <span class="mini">선택: <span id="pickedCount">0</span></span>
        </div>
        <div class="listBody" id="programList"></div>
      </div>
    </aside>

    <!-- 오른쪽: 탭 내용 -->
    <main class="panel">
      <div class="printArea" id="printArea"></div>

      <!-- ✅ 화면에서만 보이는 영역(출력 시 숨김) -->
      <div class="screenOnly">
        <!-- 배정 -->
        <div id="panelAssign" class="tabPanel">
          <div class="contentTop">
            <div>
              <h2 style="margin:0;">선택된 프로그램 배정</h2>
              <div class="help">노트북/태블릿/스마트폰/인원은 한 줄, 메모는 아래에 입력합니다.</div>
            </div>
            <div class="mini">현재 <span class="count" id="selectedCount2">0</span>개 선택</div>
          </div>

          <div id="assignCards"></div>
        </div>

        <!-- 총합 -->
        <div id="panelTotals" class="tabPanel" style="display:none;">
          <div class="contentTop">
            <div>
              <h2 style="margin:0;">교구 총합</h2>
              <div class="help">노트북/태블릿/스마트폰은 항상 표시됩니다. (여분도 여기서 입력 가능)</div>
            </div>
            <div class="mini no-print">
              <button class="btn" id="btnAddExtra">+ 추가 교구</button>
            </div>
          </div>

          <div style="margin-top:12px;">
            <table>
              <thead>
                <tr><th>항목</th><th style="width:180px;">수량</th><th style="width:130px;">구분</th></tr>
              </thead>
              <tbody id="totalsTable"></tbody>
            </table>
          </div>

          <div style="margin-top:14px;">
            <h2 style="font-size:15px; margin:0 0 8px;">추가로 챙길 것</h2>
            <table>
              <thead>
                <tr><th>항목</th><th style="width:180px;">수량</th><th style="width:120px;" class="no-print">삭제</th></tr>
              </thead>
              <tbody id="extrasTable"></tbody>
            </table>
          </div>
        </div>

        <!-- 미리보기 -->
        <div id="panelPreview" class="tabPanel" style="display:none;">
          <div class="contentTop">
            <div>
              <h2 style="margin:0;">문구 미리보기</h2>
            </div>
          </div>
          <div id="previewBox" class="mono"></div>
        </div>
      </div>
    </main>
  </div>
</div>

    { id:"p33", name:"로고 디자인", notes:"전자기기(태블릿·스마트폰)", autoSmartphone:true },
    { id:"p34", name:"애니메이터", notes:"전자기기(태블릿·스마트폰)", autoSmartphone:true },
    { id:"p35", name:"시각디자인(퀴버/AI 캐릭터)", notes:"전자기기(태블릿·스마트폰)\n* 퀴버: 도안 유인물, 색연필 포함", autoSmartphone:true },
    { id:"p36", name:"인포메이션 디자인", notes:"유인물, 전자기기(태블릿·스마트폰)", autoSmartphone:true },
    { id:"p37", name:"3D 설계 모델링", notes:"3D 키트(펜, 어댑터·케이블, 필라멘트, 장갑, 가위, 도안), 멀티탭", autoSmartphone:false },
    { id:"p38", name:"3D설계(건축)", notes:"3D 키트(펜, 어댑터·케이블, 필라멘트, 장갑, 가위, 도안), 멀티탭\n추가 교구 확인 필요", autoSmartphone:false },
    { id:"p39", name:"로봇", notes:"유킷 or 지무, 유킷통, 배틀맵, 전자기기(태블릿·스마트폰)\n* 네오봇: 자율주행 키트와 동일", autoSmartphone:true },
    { id:"p40", name:"디지털 헬스", notes:"측정 키트(악력기, 산소포화도, 혈압, 민첩성, 자), 유인물", autoSmartphone:false },
    { id:"p41", name:"자율주행", notes:"네오봇, 네오봇통(4인 1조), 주행맵, 전자기기(태블릿·스마트폰)", autoSmartphone:true },
    { id:"p42", name:"스타트업 설계", notes:"전자기기(태블릿·스마트폰)", autoSmartphone:true },
    { id:"p43", name:"IMC(통합 마케팅 커뮤니케이션)", notes:"IMC키트(화이트보드, 보드마카, 상세표), 전자기기(태블릿·스마트폰)", autoSmartphone:true },
    { id:"p44", name:"생명-바이오 파이썬", notes:"전자기기(태블릿·스마트폰)", autoSmartphone:true },
  ];

  const DEFAULT_STATE = {
    meta: { school:"", session:"", date:"", people:0 },
    selected: [],
    programData: {},
    totalsOverrides: {},
    extrasDevices: { laptop:0, tablet:0, smartphone:0 },
    extras: [
      { item:"카트", qty:1 },
      { item:"물", qty:1 },
      { item:"생수", qty:30 },
    ]
  };

  function deepClone(o){ return JSON.parse(JSON.stringify(o)); }

  function makeDefaultProgramData(p, people){
    return {
      students: Number.isFinite(people) ? people : 0,
      notes: p.notes || "",
      laptop: 0,
      tablet: 0,
      smartphone: p.autoSmartphone ? (Number.isFinite(people) ? people : 0) : 0,
    };
  }

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      const base = deepClone(DEFAULT_STATE);
      if(!raw) return initFromDefault(base);

      const parsed = JSON.parse(raw);
      base.meta = { ...base.meta, ...(parsed.meta||{}) };
      base.selected = Array.isArray(parsed.selected) ? parsed.selected : base.selected;
      base.programData = parsed.programData || base.programData;
      base.totalsOverrides = parsed.totalsOverrides || {};
      base.extrasDevices = parsed.extrasDevices || base.extrasDevices;
      base.extras = Array.isArray(parsed.extras) ? parsed.extras : base.extras;

      for(const p of PROGRAM_MASTER){
        if(!base.programData[p.id]){
          base.programData[p.id] = makeDefaultProgramData(p, clampInt(base.meta.people));
        }else{
          normalizeProgramData(base.programData[p.id], p);
        }
      }
      return base;
    }catch{
      const base = deepClone(DEFAULT_STATE);
      return initFromDefault(base);
    }
  }

  function initFromDefault(base){
    const people = clampInt(base.meta.people);
    for(const p of PROGRAM_MASTER){
      base.programData[p.id] = makeDefaultProgramData(p, people);
    }
    return base;
  }

  function normalizeProgramData(d, p){
    if(typeof d.students !== "number") d.students = 0;
    if(typeof d.notes !== "string") d.notes = p.notes || "";
    if(typeof d.laptop !== "number") d.laptop = 0;
    if(typeof d.tablet !== "number") d.tablet = 0;
    if(typeof d.smartphone !== "number") d.smartphone = 0;
  }

  function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

  function clampInt(v){
    const n = Number(String(v).replace(/[^0-9-]/g,""));
    if(!Number.isFinite(n)) return 0;
    return Math.max(0, Math.trunc(n));
  }

  function escapeHtml(s){
    return String(s)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#39;");
  }

  let state = loadState();

  const elSchool = document.getElementById("school");
  const elSession = document.getElementById("session");
  const elDate = document.getElementById("date");
  const elPeople = document.getElementById("people");

  const elSearch = document.getElementById("search");
  const elProgramList = document.getElementById("programList");
  const elPickedCount = document.getElementById("pickedCount");

  const elSelectedCount2 = document.getElementById("selectedCount2");
  const elAssignCards = document.getElementById("assignCards");

  const elTotalsTable = document.getElementById("totalsTable");
  const elExtrasTable = document.getElementById("extrasTable");
  const elPreviewBox = document.getElementById("previewBox");
  const elPrintArea = document.getElementById("printArea");

  const tabAssign = document.getElementById("tabAssign");
  const tabTotals = document.getElementById("tabTotals");
  const tabPreview = document.getElementById("tabPreview");
  const panelAssign = document.getElementById("panelAssign");
  const panelTotals = document.getElementById("panelTotals");
  const panelPreview = document.getElementById("panelPreview");

  function setTab(which){
    const all = [
      {tab:tabAssign, panel:panelAssign, key:"assign"},
      {tab:tabTotals, panel:panelTotals, key:"totals"},
      {tab:tabPreview, panel:panelPreview, key:"preview"},
    ];
    for(const t of all){
      const on = t.key === which;
      t.tab.setAttribute("aria-selected", on ? "true":"false");
      t.panel.style.display = on ? "" : "none";
    }
    render();
  }
  tabAssign.onclick = ()=>setTab("assign");
  tabTotals.onclick = ()=>setTab("totals");
  tabPreview.onclick = ()=>setTab("preview");

  function bindMeta(){
    elSchool.value = state.meta.school || "";
    elSession.value = state.meta.session || "";
    elDate.value = state.meta.date || "";
    elPeople.value = Number(state.meta.people||0);

    elSchool.oninput = ()=>{
      state.meta.school = elSchool.value;
      saveState();
      renderPreviewOnly();
    };
    elSession.oninput = ()=>{
      state.meta.session = elSession.value;
      saveState();
      renderPreviewOnly();
    };
    elDate.oninput = ()=>{
      state.meta.date = elDate.value;
      saveState();
      renderPreviewOnly();
    };
    elPeople.oninput = ()=>{
      state.meta.people = clampInt(elPeople.value);
      saveState();
      renderPreviewOnly();
    };
  }

  function getFilteredPrograms(){
    const q = (elSearch.value||"").trim().toLowerCase();
    if(!q) return PROGRAM_MASTER;
    return PROGRAM_MASTER.filter(p=>p.name.toLowerCase().includes(q));
  }

  function renderProgramList(){
    const list = getFilteredPrograms();
    elPickedCount.textContent = String(state.selected.length);

    elProgramList.innerHTML = list.map(p=>{
      const checked = state.selected.includes(p.id);
      return `
        <label class="item">
          <input type="checkbox" data-pick="${escapeHtml(p.id)}" ${checked ? "checked":""} />
          <strong>${escapeHtml(p.name)}</strong>
        </label>
      `;
    }).join("");

    elProgramList.querySelectorAll('input[data-pick]').forEach(chk=>{
      chk.addEventListener("change", ()=>{
        const id = chk.getAttribute("data-pick");
        const on = chk.checked;

        if(on && !state.selected.includes(id)){
          state.selected.push(id);

          const p = PROGRAM_MASTER.find(x=>x.id===id);
          const people = clampInt(state.meta.people);

          const d = state.programData[id] || makeDefaultProgramData(p, people);
          d.students = people;

          if(p && p.autoSmartphone) d.smartphone = people;
          if(p && (!d.notes || !d.notes.trim())) d.notes = p.notes || "";

          state.programData[id] = d;
        }

        if(!on && state.selected.includes(id)){
          state.selected = state.selected.filter(x=>x!==id);
        }

        saveState();
        render();
      });
    });
  }

  function renderAssign(){
    const selected = state.selected
      .map(id=>PROGRAM_MASTER.find(p=>p.id===id))
      .filter(Boolean);

    elSelectedCount2.textContent = String(selected.length);

    if(selected.length===0){
      elAssignCards.innerHTML = `<div class="help">왼쪽에서 프로그램을 선택하면 이곳에 카드가 생성됩니다.</div>`;
      return;
    }

    elAssignCards.innerHTML = selected.map(p=>{
      const d = state.programData[p.id];
      return `
        <div class="card">
          <div class="cardTitle">
            <h3>${escapeHtml(p.name)}</h3>
          </div>

          <div class="rowInputs">
            <div class="inField">
              <span>노트북</span>
              <input type="number" min="0" step="1" data-laptop="${escapeHtml(p.id)}" value="${Number(d.laptop||0)}">
            </div>
            <div class="inField">
              <span>태블릿</span>
              <input type="number" min="0" step="1" data-tablet="${escapeHtml(p.id)}" value="${Number(d.tablet||0)}">
            </div>
            <div class="inField">
              <span>스마트폰</span>
              <input type="number" min="0" step="1" data-phone="${escapeHtml(p.id)}" value="${Number(d.smartphone||0)}">
            </div>
            <div class="inField">
              <span>인원</span>
              <input type="number" min="0" step="1" data-students="${escapeHtml(p.id)}" value="${Number(d.students||0)}">
            </div>
          </div>

          <div class="help" style="margin-top:8px; margin-bottom:6px;">메모(학교 기기 사용, 추가 준비물 등)</div>
          <textarea data-notes="${escapeHtml(p.id)}">${escapeHtml(d.notes || "")}</textarea>
        </div>
      `;
    }).join("");

    elAssignCards.querySelectorAll('input[data-laptop]').forEach(inp=>{
      inp.addEventListener("input", ()=>{
        const id = inp.getAttribute("data-laptop");
        state.programData[id].laptop = clampInt(inp.value);
        if(Object.prototype.hasOwnProperty.call(state.totalsOverrides,"노트북")) delete state.totalsOverrides["노트북"];
        saveState();
        renderTotals();
        renderPreviewOnly();
      });
    });

    elAssignCards.querySelectorAll('input[data-tablet]').forEach(inp=>{
      inp.addEventListener("input", ()=>{
        const id = inp.getAttribute("data-tablet");
        state.programData[id].tablet = clampInt(inp.value);
        if(Object.prototype.hasOwnProperty.call(state.totalsOverrides,"태블릿")) delete state.totalsOverrides["태블릿"];
        saveState();
        renderTotals();
        renderPreviewOnly();
      });
    });

    elAssignCards.querySelectorAll('input[data-phone]').forEach(inp=>{
      inp.addEventListener("input", ()=>{
        const id = inp.getAttribute("data-phone");
        state.programData[id].smartphone = clampInt(inp.value);
        if(Object.prototype.hasOwnProperty.call(state.totalsOverrides,"스마트폰")) delete state.totalsOverrides["스마트폰"];
        saveState();
        renderTotals();
        renderPreviewOnly();
      });
    });

    elAssignCards.querySelectorAll('input[data-students]').forEach(inp=>{
      inp.addEventListener("input", ()=>{
        const id = inp.getAttribute("data-students");
        state.programData[id].students = clampInt(inp.value);
        saveState();
        renderPreviewOnly();
      });
    });

    elAssignCards.querySelectorAll('textarea[data-notes]').forEach(ta=>{
      ta.addEventListener("input", ()=>{
        const id = ta.getAttribute("data-notes");
        state.programData[id].notes = ta.value;
        saveState();
        renderPreviewOnly();
      });
    });
  }

  function calcBaseDeviceSums(){
    const base = { laptop:0, tablet:0, smartphone:0 };
    for(const id of state.selected){
      const d = state.programData[id];
      if(!d) continue;
      base.laptop += Number(d.laptop||0);
      base.tablet += Number(d.tablet||0);
      base.smartphone += Number(d.smartphone||0);
    }
    return base;
  }

  function calcTotals(){
    const totals = { "노트북":0, "태블릿":0, "스마트폰":0 };

    const base = calcBaseDeviceSums();
    totals["노트북"] = base.laptop;
    totals["태블릿"] = base.tablet;
    totals["스마트폰"] = base.smartphone;

    const ed = state.extrasDevices || { laptop:0, tablet:0, smartphone:0 };
    totals["노트북"] += Number(ed.laptop||0);
    totals["태블릿"] += Number(ed.tablet||0);
    totals["스마트폰"] += Number(ed.smartphone||0);

    for(const [k,v] of Object.entries(state.totalsOverrides||{})){
      totals[k] = Number(v||0);
    }

    return totals;
  }

  function renderTotals(){
    const totals = calcTotals();
    const ALWAYS_SHOW = ["노트북","태블릿","스마트폰"];

    const keys = Object.keys(totals)
      .filter(k => ALWAYS_SHOW.includes(k) || Number(totals[k]) > 0 || Object.prototype.hasOwnProperty.call(state.totalsOverrides||{}, k))
      .sort((a,b)=>a.localeCompare(b,"ko"));

    if(keys.length === 0){
      elTotalsTable.innerHTML = `<tr><td colspan="3" style="color:var(--muted); font-weight:800;">아직 입력된 수량이 없어요. (0은 표시되지 않습니다)</td></tr>`;
    }else{
      elTotalsTable.innerHTML = keys.map(k=>{
        const isDevice = ALWAYS_SHOW.includes(k);
        const isManual = Object.prototype.hasOwnProperty.call(state.totalsOverrides||{}, k);

        return `
          <tr>
            <td>${escapeHtml(k)}</td>
            <td>
              <input type="number" min="0" step="1" data-total="${escapeHtml(k)}" value="${Number(totals[k]||0)}">
            </td>
            <td>
              ${isManual
                ? `<strong style="color:#b00020">수동</strong> <button class="btn no-print" style="padding:6px 8px; margin-left:6px;" data-reset="${escapeHtml(k)}">↺</button>`
                : isDevice
                  ? `<span style="color:var(--muted); font-weight:900;">자동+여분</span>`
                  : `<span style="color:var(--muted); font-weight:900;">자동</span>`
              }
            </td>
          </tr>
        `;
      }).join("");
    }

    elTotalsTable.querySelectorAll('input[data-total]').forEach(inp=>{
      inp.addEventListener("input", ()=>{
        const key = inp.getAttribute("data-total");
        const v = clampInt(inp.value);

        if(key === "노트북" || key === "태블릿" || key === "스마트폰"){
          const base = calcBaseDeviceSums();
          const extraVal =
            key === "노트북" ? Math.max(0, v - base.laptop) :
            key === "태블릿" ? Math.max(0, v - base.tablet) :
                               Math.max(0, v - base.smartphone);

          if(!state.extrasDevices) state.extrasDevices = { laptop:0, tablet:0, smartphone:0 };
          if(key === "노트북") state.extrasDevices.laptop = extraVal;
          if(key === "태블릿") state.extrasDevices.tablet = extraVal;
          if(key === "스마트폰") state.extrasDevices.smartphone = extraVal;

          if(Object.prototype.hasOwnProperty.call(state.totalsOverrides, key)) delete state.totalsOverrides[key];

          saveState();
          renderTotals();
          renderPreviewOnly();
          return;
        }

        if(v === 0) delete state.totalsOverrides[key];
        else state.totalsOverrides[key] = v;

        saveState();
        renderTotals();
        renderPreviewOnly();
      });
    });

    elTotalsTable.querySelectorAll('button[data-reset]').forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const key = btn.getAttribute("data-reset");
        delete state.totalsOverrides[key];
        saveState();
        renderTotals();
        renderPreviewOnly();
      });
    });

    elExtrasTable.innerHTML = state.extras.map((ex, idx)=>`
      <tr>
        <td><input type="text" data-ex-item="${idx}" value="${escapeHtml(ex.item||"")}" style="width:100%;"></td>
        <td><input type="number" min="0" step="1" data-ex-qty="${idx}" value="${Number(ex.qty||0)}"></td>
        <td class="no-print"><button class="btn" data-ex-del="${idx}">삭제</button></td>
      </tr>
    `).join("");

    elExtrasTable.querySelectorAll('input[data-ex-item]').forEach(inp=>{
      inp.addEventListener("input", ()=>{
        const i = Number(inp.getAttribute("data-ex-item"));
        state.extras[i].item = inp.value;
        saveState();
        renderPreviewOnly();
        buildPrintArea();
      });
    });

    elExtrasTable.querySelectorAll('input[data-ex-qty]').forEach(inp=>{
      inp.addEventListener("input", ()=>{
        const i = Number(inp.getAttribute("data-ex-qty"));
        state.extras[i].qty = clampInt(inp.value);
        saveState();
        renderPreviewOnly();
        buildPrintArea();
      });
    });

    elExtrasTable.querySelectorAll('button[data-ex-del]').forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const i = Number(btn.getAttribute("data-ex-del"));
        state.extras.splice(i,1);
        saveState();
        renderTotals();
        renderPreviewOnly();
        buildPrintArea();
      });
    });

    buildPrintArea();
  }

  function buildKakaoText(){
    const meta = state.meta;
    const school = (meta.school||"").trim();
    const session = (meta.session||"").trim();
    const date = (meta.date||"").trim();
    const people = Number(meta.people||0);

    const titleBits = [];
    if(date) titleBits.push(date);
    if(school) titleBits.push(school);
    if(session) titleBits.push(session);
    if(people) titleBits.push(`인원 ${people}`);

    const title = titleBits.length ? titleBits.join(" / ") : "교구 준비";
    let out = `◆ ${title}\n\n`;

    for(const id of state.selected){
      const p = PROGRAM_MASTER.find(x=>x.id===id);
      const d = state.programData[id];
      if(!p || !d) continue;

      out += `✔ ${p.name} (${Number(d.students||0)})\n`;

      if(Number(d.laptop||0) > 0) out += `- 노트북 ${Number(d.laptop)}\n`;
      if(Number(d.tablet||0) > 0) out += `- 태블릿 ${Number(d.tablet)}\n`;
      if(Number(d.smartphone||0) > 0) out += `- 스마트폰 ${Number(d.smartphone)}\n`;

      const memo = (d.notes||"").trim();
      if(memo) out += `${memo}\n`;
      out += `\n`;
    }

    const totals = calcTotals();
    const keys = Object.keys(totals).sort((a,b)=>a.localeCompare(b,"ko"));

    const totalLines = [];
    for(const k of keys){
      const v = Number(totals[k]||0);
      if(v > 0) totalLines.push(`- ${k} ${v}`);
    }
    if(totalLines.length){
      out += `총합 교구\n` + totalLines.join("\n") + `\n\n`;
    }

    const extraLines = [];
    for(const ex of state.extras){
      const item = (ex.item||"").trim();
      const qty = Number(ex.qty||0);
      if(!item) continue;
      if(qty <= 0) continue;
      extraLines.push(`- ${item} ${qty}`);
    }
    if(extraLines.length){
      out += `추가로 챙길 것\n` + extraLines.join("\n");
    }

    return out.trim();
  }

  function renderPreviewOnly(){
    elPreviewBox.textContent = buildKakaoText();
    buildPrintArea();
  }

  function buildPrintArea(){
    const meta = state.meta;
    const school = (meta.school||"").trim();
    const session = (meta.session||"").trim();
    const date = (meta.date||"").trim();
    const people = Number(meta.people||0);

    // ✅ 출력용: 날짜 / 학교명 / 차시 / 인원 순서 + 한 줄
    const head = `
      <div class="printHead">
        <div class="big">교구 점검표</div>

        <div class="printMetaRow">
          <span class="metaItem">
            <span class="label">날짜:</span>
            <span class="value">${escapeHtml(date || "-")}</span>
          </span>

          <span class="metaItem">
            <span class="label">학교명:</span>
            <span class="value">${escapeHtml(school || "-")}</span>
          </span>

          <span class="metaItem">
            <span class="label">차시:</span>
            <span class="value">${escapeHtml(session || "-")}</span>
          </span>

          <span class="metaItem">
            <span class="label">인원:</span>
            <span class="value">${people || 0}</span>
          </span>
        </div>
      </div>
    `;

    const body = `<div class="mono">${escapeHtml(buildKakaoText())}</div>`;
    elPrintArea.innerHTML = head + body;
  }

  function render(){
    bindMeta();
    renderProgramList();
    renderAssign();
    renderTotals();
    renderPreviewOnly();
    elPickedCount.textContent = String(state.selected.length);
  }

  elSearch.addEventListener("input", renderProgramList);

  document.getElementById("btnAll").onclick = ()=>{
    state.selected = PROGRAM_MASTER.map(p=>p.id);

    const people = clampInt(state.meta.people);
    for(const p of PROGRAM_MASTER){
      const d = state.programData[p.id] || makeDefaultProgramData(p, people);
      if(!state.programData[p.id]) state.programData[p.id] = d;
      d.students = people;
      if(p.autoSmartphone) d.smartphone = people;
      if(!d.notes || !d.notes.trim()) d.notes = p.notes || "";
    }

    saveState();
    render();
  };

  document.getElementById("btnNone").onclick = ()=>{
    state.selected = [];
    saveState();
    render();
  };

  document.getElementById("btnAddExtra").onclick = ()=>{
    state.extras.push({ item:"", qty:0 });
    saveState();
    renderTotals();
    renderPreviewOnly();
  };

  document.getElementById("btnCopy").onclick = async ()=>{
    const text = buildKakaoText();
    try{
      await navigator.clipboard.writeText(text);
      alert("톡용 문구가 복사됐어요");
    }catch{
      prompt("복사가 막혔어요. 아래 문구를 복사하세요", text);
    }
  };

  document.getElementById("btnPrint").onclick = ()=>{
    buildPrintArea();
    window.print();
  };

  document.getElementById("btnReset").onclick = ()=>{
    if(!confirm("정말 초기화할까요?")) return;
    state = initFromDefault(deepClone(DEFAULT_STATE));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    render();
  };

  render();
</script>
</body>
</html>
